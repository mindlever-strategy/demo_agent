<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric AI Agent Demo - Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect width='40' height='40' rx='10' fill='%23c4a24a'/><path d='M12 28V18L17 22V28M17 28V14L23 18V28M23 28V12L29 16V28' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">
                <svg width="44" height="44" viewBox="0 0 40 40" fill="none">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#c4a24a"/>
                            <stop offset="100%" style="stop-color:#d4b45a"/>
                        </linearGradient>
                    </defs>
                    <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
                    <path d="M12 28V18L17 22V28M17 28V14L23 18V28M23 28V12L29 16V28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Metric AI</h1>
            <p class="subtitle">Create your account</p>
        </div>

        <form id="signupForm" class="login-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn-login">Create Account</button>
            <div id="error" class="error-msg"></div>
        </form>

        <div class="auth-switch">
            <p>Already have an account? <a href="login.html">Log in</a></p>
        </div>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
